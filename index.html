<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Audioposter</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;color:white;font-family:Arial,sans-serif;user-select:none;touch-action:manipulation}#app{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;text-align:center;padding:28px}.testo{max-width:760px;font-size:clamp(24px,5vw,46px);line-height:1.25;font-weight:bold}.sotto{display:block;margin-top:22px;font-size:clamp(16px,3vw,24px);font-weight:normal;opacity:.85}.angolo{position:fixed;width:50vw;height:50vh;display:none;align-items:center;justify-content:center;text-align:center;padding:18px;border:2px dashed rgba(255,255,255,.25);background:rgba(255,255,255,.04);font-size:clamp(20px,4vw,34px);font-weight:bold}body.menu .angolo{display:flex}#altoSinistra{top:0;left:0}#altoDestra{top:0;right:0}#bassoSinistra{bottom:0;left:0}#bassoDestra{bottom:0;right:0}#avvio{position:fixed;inset:0;z-index:10;background:#111827;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}#avvio.nascosto{display:none}#stato{position:fixed;left:8px;right:8px;bottom:8px;text-align:center;font-size:13px;opacity:.65}.lampeggia{animation:pulse .65s infinite alternate}@keyframes pulse{from{opacity:.55;transform:scale(.99)}to{opacity:1;transform:scale(1.02)}}</style></head><body><div id="avvio"><div class="testo">Tocca per iniziare<span class="sotto">Al primo tocco partirà l'audio.</span></div></div><div id="app"><div class="testo" id="testo">Audioposter<span class="sotto">Un clic: pausa/riprendi. Doppio clic: torna indietro. Tre clic: avanti di 10 secondi.</span></div></div><div class="angolo" id="altoSinistra"></div><div class="angolo" id="altoDestra"></div><div class="angolo" id="bassoSinistra"></div><div class="angolo" id="bassoDestra"></div><div id="stato"></div><audio id="player" preload="auto" playsinline></audio><script>const CONFIG={"titolo":"Audioposter","nodoIniziale":"descrizione audio","secondiFinestraIstruzioni":3,"saltoTriploClick":10};const NODI={"Marta-audioguida":{"tipo":"audio","titolo":"AUDIOGUIDA","audio":"Marta-audioguida_1.mp3"}};const player=document.getElementById("player"),testo=document.getElementById("testo"),avvio=document.getElementById("avvio"),stato=document.getElementById("stato");const quadranti={altoSinistra:document.getElementById("altoSinistra"),altoDestra:document.getElementById("altoDestra"),bassoSinistra:document.getElementById("bassoSinistra"),bassoDestra:document.getElementById("bassoDestra")};let nodoCorrente=null,nodoPrecedente=null,modalita="attesa",timerClick=null,conteggioClick=0,finestraIstruzioniAttiva=false,timerFinestraIstruzioni=null;function scrivi(t,s=""){testo.innerHTML=t+(s?'<span class="sotto">'+s+'</span>':"")}function statoTxt(m){stato.textContent=m||""}function nascondiAvvio(){avvio.classList.add("nascosto")}function mostraAvvio(){avvio.classList.remove("nascosto")}function nascondiQuadranti(){document.body.classList.remove("menu");Object.values(quadranti).forEach(q=>{q.textContent="";q.style.visibility="visible"})}function mostraQuadranti(n){nascondiAvvio();document.body.classList.add("menu");Object.entries(quadranti).forEach(([p,e])=>{const s=n.scelte&&n.scelte[p];e.textContent=s?s.testo:"";e.style.visibility=s?"visible":"hidden"})}function riproduciNodo(nome,prov=null){const n=NODI[nome];if(!n){scrivi("Nodo non trovato",nome);return}nodoPrecedente=prov||nodoCorrente;nodoCorrente=nome;modalita=n.tipo;nascondiQuadranti();nascondiAvvio();testo.classList.remove("lampeggia");scrivi(n.titolo||nome,n.sottotitolo||"Un clic: pausa/riprendi. Doppio clic: torna indietro. Tre clic: avanti veloce.");player.pause();player.src=n.audio;player.currentTime=0;player.load();const p=player.play();if(p!==undefined)p.then(()=>statoTxt("Audio: "+nome)).catch(()=>{mostraAvvio();statoTxt("Tocca lo schermo.")})}function apriFinestraIstruzioni(){const n=NODI[nodoCorrente];finestraIstruzioniAttiva=true;modalita="finestraIstruzioni";scrivi("Vuoi ascoltare le istruzioni?","Fai doppio tap entro "+CONFIG.secondiFinestraIstruzioni+" secondi.");testo.classList.add("lampeggia");clearTimeout(timerFinestraIstruzioni);timerFinestraIstruzioni=setTimeout(()=>{if(!finestraIstruzioniAttiva)return;finestraIstruzioniAttiva=false;testo.classList.remove("lampeggia");riproduciNodo(n.dopo||CONFIG.nodoIniziale,nodoCorrente)},CONFIG.secondiFinestraIstruzioni*1000)}function avviaIstruzioni(){const n=NODI[nodoCorrente];clearTimeout(timerFinestraIstruzioni);finestraIstruzioniAttiva=false;testo.classList.remove("lampeggia");riproduciNodo(n.istruzioni,nodoCorrente)}player.addEventListener("ended",()=>{const n=NODI[nodoCorrente];if(!n)return;if(n.tipo==="introduzione"){apriFinestraIstruzioni();return}if(n.tipo==="menu"){mostraQuadranti(n);return}if(n.tipo==="audio"&&n.dopo){riproduciNodo(n.dopo,nodoCorrente);return}if(n.tipo==="storia"&&n.ritorno){riproduciNodo(n.ritorno,nodoCorrente);return}});player.addEventListener("error",()=>{mostraAvvio();scrivi("Audio non trovato","Controlla il nome del file.");statoTxt(player.src)});function pausaRiprendi(){if(modalita==="finestraIstruzioni"||modalita==="attesa")return;if(player.paused)player.play().catch(()=>mostraAvvio());else{player.pause();statoTxt("Audio in pausa")}}function tornaIndietro(){if(modalita==="finestraIstruzioni"){avviaIstruzioni();return}const n=NODI[nodoCorrente];if(!n)return;if(n.tipo==="storia"&&n.ritorno){riproduciNodo(n.ritorno,nodoCorrente);return}if(nodoPrecedente&&NODI[nodoPrecedente])riproduciNodo(nodoPrecedente,nodoCorrente)}function avanti(){if(!player.src||isNaN(player.duration)||!isFinite(player.duration))return;player.currentTime=Math.min(player.duration-.1,player.currentTime+CONFIG.saltoTriploClick);statoTxt("Avanti di "+CONFIG.saltoTriploClick+" secondi")}function gestisci(n){if(n===1)pausaRiprendi();else if(n===2)tornaIndietro();else avanti()}document.body.addEventListener("click",e=>{if(e.target.classList.contains("angolo"))return;if(e.target.closest("#avvio"))return;conteggioClick++;clearTimeout(timerClick);timerClick=setTimeout(()=>{gestisci(conteggioClick);conteggioClick=0},320)});avvio.addEventListener("click",e=>{e.stopPropagation();if(modalita==="attesa")riproduciNodo(CONFIG.nodoIniziale);else player.play().then(nascondiAvvio).catch(()=>mostraAvvio())});Object.entries(quadranti).forEach(([pos,el])=>{el.addEventListener("click",e=>{e.stopPropagation();const n=NODI[nodoCorrente];if(!n||!n.scelte||!n.scelte[pos])return;riproduciNodo(n.scelte[pos].vaiA,nodoCorrente)})});</script></body></html>
